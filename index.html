<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YOCIM NEXUS</title>
  </head>
  <body>
    <div id="app">
      <div id="skeleton" style="display:flex;flex-direction:column;height:100vh;background:#1e1e1e;">
        <div style="height:38px;display:flex;align-items:center;padding:0 8px;gap:4px;">
          <div style="width:28px;height:28px;border-radius:4px;background:#333;"></div>
          <div style="width:28px;height:28px;border-radius:4px;background:#333;"></div>
          <div style="width:28px;height:28px;border-radius:4px;background:#333;"></div>
          <div style="flex:1;height:28px;border-radius:14px;background:#2a2a2a;margin:0 8px;"></div>
        </div>
        <div style="height:36px;display:flex;align-items:center;padding:0 8px;gap:2px;border-bottom:1px solid #333;">
          <div style="width:120px;height:28px;border-radius:6px;background:#2a2a2a;"></div>
          <div style="width:120px;height:28px;border-radius:6px;background:#2a2a2a;"></div>
        </div>
        <div style="flex:1;background:#1e1e1e;"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
